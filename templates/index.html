<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid gray; }
        button { padding: 10px; border: none; background: green; color: white; cursor: pointer; }
        .result { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🍳 Recipe Finder App</h1>

    <form method="POST">
        <input type="text" name="dish" placeholder="Enter dish name (e.g., Maggi)" required>
        <button type="submit">Search</button>
    </form>

    <div class="result">{{ recipe_result }}</div>

</body>
</html>
